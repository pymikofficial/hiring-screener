[build]
  command = "npm run download-model"
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# external_node_modules alone was not reliably copying these native-binary
# packages' raw node_modules folders into the deployed bundle (confirmed:
# require('@huggingface/transformers') threw "Cannot find module" at
# runtime, well after external_node_modules said to keep it external).
# included_files is a second, verified-working copy mechanism (it's what
# ships the bundled model weights below) used here as a reliable fallback.
# Scoped to this one function only, other functions (e.g. check-screening)
# don't touch the model or transformers.js and don't need the extra ~15MB.
[functions."generate-screening-background"]
  external_node_modules = ["@huggingface/transformers", "onnxruntime-node", "sharp"]
  included_files = [
    "netlify/functions/models/**",
    "node_modules/@huggingface/transformers/**",
    "node_modules/onnxruntime-node/**"
  ]
